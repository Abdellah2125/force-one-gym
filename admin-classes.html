<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin - Class Schedule Manager</title>
    <link rel="stylesheet" href="css/admin.css">

</head>

<body>

    <header>
        <h1>Class Schedule Manager</h1>
    </header>

    <div class="admin-layout">
        <aside class="sidebar">
            <ul>
                <li><a href="admin-dashboard.html">Dashboard</a></li>
                <li><a href="admin-members.html">Members</a></li>
                <li><a class="active" href="#">Classes</a></li>
                <li><a href="admin-plans.html"> Plans</a></li>
                <li><a href="admin-messages.html">📩 Contact Messages</a></li>
                <li style="margin-top: 50px;">
                    <a href="#" onclick="logout()" style="color: #e74c3c;">
                        🚪 Logout
                    </a>
                </li>
            </ul>
        </aside>

        <main class="content">
            <section class="card">
                <h2>➕ Add New Class</h2>
                <form id="classForm">
                    <div class="form-row">
                        <input id="name" placeholder="Class Name" required>
                        <input id="trainer" placeholder="Trainer" required>
                    </div>
                    <div class="form-row">
                        <select id="day">
                            <option>Monday</option>
                            <option>Tuesday</option>
                            <option>Wednesday</option>
                            <option>Thursday</option>
                            <option>Friday</option>
                            <option>Saturday</option>
                            <option>Sunday</option>
                        </select>
                        <input id="time" placeholder="Time (e.g., 10:00 - 11:00)" required>
                    </div>
                    <div class="form-row">
                        <input id="duration" type="number" placeholder="Duration (min)" required>
                        <select id="difficulty">
                            <option value="Beginner">🟢 Beginner</option>
                            <option value="Intermediate">🟡 Intermediate</option>
                            <option value="Advanced">🔴 Advanced</option>
                            <option value="All Levels">🟣 All Levels</option>
                        </select>
                        <input id="capacity" type="number" placeholder="Max Capacity" required>
                    </div>
                    <button type="submit"
                        style="background: #27ae60; color: white; border: none; padding: 0.8rem; width: 100%;">+ Add
                        Class</button>
                </form>
            </section>

            <section class="card">
                <h2>📋 Classes List</h2>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Trainer</th>
                                <th>Day</th>
                                <th>Time</th>
                                <th>Duration</th>
                                <th>Difficulty</th>
                                <th>Capacity</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>✏️ Edit Class</h3>
            <input id="editName" placeholder="Class Name">
            <input id="editTrainer" placeholder="Trainer">
            <select id="editDay">
                <option>Monday</option>
                <option>Tuesday</option>
                <option>Wednesday</option>
                <option>Thursday</option>
                <option>Friday</option>
                <option>Saturday</option>
                <option>Sunday</option>
            </select>
            <input id="editTime" placeholder="Time">
            <input id="editDuration" type="number" placeholder="Duration (min)">
            <select id="editDifficulty">
                <option value="Beginner">🟢 Beginner</option>
                <option value="Intermediate">🟡 Intermediate</option>
                <option value="Advanced">🔴 Advanced</option>
                <option value="All Levels">🟣 All Levels</option>
            </select>
            <input id="editCapacity" type="number" placeholder="Max Capacity">
            <div class="modal-buttons">
                <button class="save-btn" onclick="saveEdit()">Save</button>
                <button class="cancel-btn" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/data-config.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
