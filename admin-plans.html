<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Plans Management</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="plans-page">

    <header>
        <h1>Plans Management</h1>
    </header>

    <div class="admin-layout">
        <aside class="sidebar"></aside>

        <main class="content">
            <div class="plan-wrapper">

                <section class="plan-section">
                    <h2>Existing Plans</h2>
                    <div class="stats-badge" id="plansCount">Total Plans: 0</div>
                    <div class="table-responsive">
                        <table id="plansTable">
                            <thead>
                                <tr>
                                    <th>Plan Name</th>
                                    <th>Price</th>
                                    <th>Duration</th>
                                    <th>Features</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <tr>
                                    <td colspan="5" class="text-center">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <section class="plan-section">
                    <h2>Add New Plan</h2>
                    <form id="planForm">
                        <div class="form-group">
                            <label for="planName">Plan Name:</label>
                            <input type="text" id="planName" required placeholder="e.g., Premium">
                        </div>
                        <div class="form-group">
                            <label for="price">Price (DA):</label>
                            <input type="number" id="price" required placeholder="e.g., 5000">
                        </div>
                        <div class="form-group">
                            <label for="duration">Duration:</label>
                            <input type="text" id="duration" required placeholder="e.g., 3 Months">
                        </div>
                        <div class="form-group">
                            <label for="features">Features / Description:</label>
                            <textarea id="features" rows="4" placeholder="List features separated by commas..."></textarea>
                        </div>
                        <button type="submit">+ Add Plan</button>
                    </form>
                </section>
            </div>
        </main>
    </div>

    <div id="editModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-content">
            <h3 id="modalTitle">Edit Plan</h3>
            <div class="form-group">
                <label for="editPlanName">Plan Name:</label>
                <input type="text" id="editPlanName">
            </div>
            <div class="form-group">
                <label for="editPrice">Price (DA):</label>
                <input type="number" id="editPrice">
            </div>
            <div class="form-group">
                <label for="editDuration">Duration:</label>
                <input type="text" id="editDuration">
            </div>
            <div class="form-group">
                <label for="editFeatures">Features:</label>
                <textarea id="editFeatures" rows="4"></textarea>
            </div>
            <div class="modal-buttons">
                <button class="save-btn" id="saveEditBtn">Save Changes</button>
                <button class="cancel-btn" id="closeEditModal">Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/data-config.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
