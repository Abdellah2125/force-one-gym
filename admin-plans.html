<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membership Plans Management</title>
    <link rel="stylesheet" href="css/admin.css">

</head>

<body>

    <header>
        <h1>Membership Plan Management</h1>
    </header>

    <div class="admin-layout">
        <aside class="sidebar">
            <ul>
                <li><a href="admin-dashboard.html"> Dashboard</a></li>
                <li><a href="admin-members.html"> Members</a></li>
                <li><a href="admin-classes.html"> Classes</a></li>
                <li><a class="active" href="#"> Plans</a></li>
                <li><a href="admin-messages.html">📩 Contact Messages</a></li>
                <li style="margin-top: 50px;"><a href="#" onclick="logout()" style="color: #e74c3c;">🚪 Logout</a></li>
            </ul>
        </aside>

        <main class="content" style="flex: 1; padding: 2rem;">
            <div class="plan-wrapper" style="display: flex; gap: 2rem; flex-wrap: wrap;">

                <!-- Existing Plans Table -->
                <section style="flex: 1; min-width: 300px;">
                    <h2>📋 Existing Plans</h2>
                    <div class="stats-badge" id="plansCount">Total Plans: 0</div>
                    <div style="overflow-x: auto;">
                        <table id="plansTable">
                            <thead>
                                <tr>
                                    <th>Plan Name</th>
                                    <th>Price</th>
                                    <th>Duration</th>
                                    <th>Features</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <tr>
                                    <td colspan="5" style="text-align: center;">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- Add New Plan Form -->
                <section style="flex: 1; min-width: 300px;">
                    <h2>➕ Add New Plan</h2>
                    <form id="planForm">
                        <div class="form-group">
                            <label>Plan Name:</label>
                            <input type="text" id="planName" required placeholder="e.g., Premium">
                        </div>

                        <div class="form-group">
                            <label>Price:</label>
                            <input type="number" id="price" required placeholder="e.g., 5000">
                        </div>

                        <div class="form-group">
                            <label>Duration:</label>
                            <input type="text" id="duration" required placeholder="e.g., 3 Months">
                        </div>

                        <div class="form-group">
                            <label>Features / Description:</label>
                            <textarea id="features" rows="4"
                                placeholder="List features separated by commas..."></textarea>
                        </div>

                        <button type="submit">➕ Add Plan</button>
                    </form>
                </section>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>✏️ Edit Plan</h3>
            <div class="form-group">
                <label>Plan Name:</label>
                <input type="text" id="editPlanName">
            </div>
            <div class="form-group">
                <label>Price:</label>
                <input type="number" id="editPrice">
            </div>
            <div class="form-group">
                <label>Duration:</label>
                <input type="text" id="editDuration">
            </div>
            <div class="form-group">
                <label>Features:</label>
                <textarea id="editFeatures" rows="4"></textarea>
            </div>
            <div class="modal-buttons">
                <button class="save-btn" onclick="saveEdit()">💾 Save Changes</button>
                <button class="cancel-btn" onclick="closeModal()">❌ Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/data-config.js"></script>
   <script src="js/admin.js"></script>
</body>

</html>
